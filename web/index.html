<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="task2026">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>task2026</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    @media print {
      @page {
        size: A4 landscape;
        margin: 10mm;
      }
      
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      
      /* Garantir que o conteúdo seja impresso em múltiplas páginas */
      * {
        page-break-inside: avoid;
      }
      
      /* Permitir quebra de página em tabelas e Gantt */
      table, .gantt-container, .task-table {
        page-break-inside: auto;
      }
      
      tr, .gantt-row {
        page-break-inside: avoid;
        page-break-after: auto;
      }
      
      thead {
        display: table-header-group;
      }
      
      tfoot {
        display: table-footer-group;
      }
      
      /* Ocultar elementos não necessários na impressão */
      button, .sidebar, .header-bar, .filter-bar, .footbar,
      .no-print, [class*="no-print"] {
        display: none !important;
      }
      
      /* Garantir que o conteúdo principal seja visível */
      .main-content, .task-table, .gantt-chart {
        display: block !important;
        width: 100% !important;
        overflow: visible !important;
      }
      
      /* Ajustar tamanhos para impressão */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
